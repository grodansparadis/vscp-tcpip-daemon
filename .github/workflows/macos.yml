name: macOS CI

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build & package (macOS)
    runs-on: macos-14        # arm64; use macos-13 for x86_64 if needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install cmake ninja openssl expat mosquitto zlib curl

      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl) \
            -DCURL_ROOT=$(brew --prefix curl) \
            -DEXPAT_INCLUDE_DIR=$(brew --prefix expat)/include \
            -DEXPAT_LIBRARY=$(brew --prefix expat)/lib/libexpat.dylib \
            -DCMAKE_PREFIX_PATH="$(brew --prefix openssl);$(brew --prefix curl);$(brew --prefix expat)"

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Package (TGZ)
        working-directory: build
        run: cpack -G TGZ

      - name: Upload TGZ
        uses: actions/upload-artifact@v4
        with:
          name: tgz-macos
          path: build/*.tar.gz

  release:
    name: Publish release packages
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
